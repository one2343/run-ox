name: Runox 自动续期

on:
  schedule:
    - cron: '5 * 1 * *'   # 每月1号第 05 分执行
  workflow_dispatch:        # 支持手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # 【新增】赋予 GITHUB_TOKEN 删除 Action 运行记录的写权限
    permissions:
      actions: write
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb scrot python3-xlib

      - name: 安装 Python 依赖
        run: |
          pip install seleniumbase requests pyautogui

      - name: 安装 ChromeDriver
        run: |
          seleniumbase install chromedriver

      - name: 运行续期脚本
        env:
          RUNOX_ACCOUNTS: ${{ secrets.RUNOX_ACCOUNTS }}
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run -a python runox_auto.py

      - name: 上传截图（始终保留，方便调试）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: artifacts/
          retention-days: 3

      # 【新增】清理旧的 Workflow 运行记录，仅保留最近 3 次
      - name: 清理旧的运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0           # 设置为 0 天，意味着主要依赖下面的保留次数逻辑
          keep_minimum_runs: 3     # 核心配置：始终保留最近 3 次运行记录
